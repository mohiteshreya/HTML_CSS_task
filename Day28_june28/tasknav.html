<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition:.3s;
}

nav a:hover{
    color:#00d084;
}

/* Hero Section */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:45px;
}

.hero h1 span{
    color:#00d084;
}

.hero h2{
    font-size:35px;
    margin:10px 0;
}

.hero p{
    color:#bbb;
    width:60%;
    margin:20px auto;
    line-height:1.6;
}

.hero button{
    padding:12px 28px;
    background:#00d084;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.hero button:hover{
    background:#00b36b;
}

/* Gallery */
.gallery{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    transition:.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Responsive */
@media(max-width:900px){
    .gallery{
        grid-template-columns:repeat(2,1fr);
    }

    .hero p{
        width:90%;
    }

    header{
        flex-direction:column;
    }

    nav{
        margin-top:15px;
    }
}

@media(max-width:600px){
    .gallery{
        grid-template-columns:1fr;
    }

    .hero h1{
        font-size:32px;
    }

    .hero h2{
        font-size:24px;
    }
}
</style>

</head>
<body>

<header>
    <div class="logo">PhotoFolio</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>I'm <span>Jenny Wilson</span></h1>

    <h2>A Professional Photographer<br>from New York City</h2>

    <p>
        Beautiful photography is the art of capturing unforgettable moments.
        Every picture tells a story and preserves memories forever.
    </p>

    <button>AVAILABLE FOR HIRE</button>
</section>

<section class="gallery">

    <img src="https://picsum.photos/id/1015/400/300" alt="">
    <img src="https://picsum.photos/id/1011/400/300" alt="">
    <img src="https://picsum.photos/id/1025/400/300" alt="">
    <img src="https://picsum.photos/id/1074/400/300" alt="">

    <img src="https://picsum.photos/id/1043/400/300" alt="">
    <img src="https://picsum.photos/id/1005/400/300" alt="">
    <img src="https://picsum.photos/id/1031/400/300" alt="">
    <img src="https://picsum.photos/id/1062/400/300" alt="">

</section>

</body>
</html>
