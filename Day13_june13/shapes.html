<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #leaf
        {
            width: 100px;
            height: 100px;
            background-color: aqua;
            margin-left: 30px;
            margin-top: 30px;
            border-bottom-left-radius: 70px;
             border-top-right-radius: 70px;
             text-align: center;
             line-height: 100px;
              color: white;
        }
             
        #halfoval
        {
            width: 200px;
            height: 100px;
            background-color: blue;
            margin-left: 150px;
            margin-top: -110px;
           border-radius: 0px 0px 100px 100px;
           text-align: center;
             line-height: 100px;
              color: white;
        }
        #oval
        {
            width: 200px;
            height: 100px;
            margin-left: 350px;
            margin-top: -120px;
            background-color: orange;
            border-radius:  50% 50% 50% 50%;
            text-align: center;
             line-height: 100px;
              color: white;
        }
        #twist
        {
            width: 100px;
            height: 100px;
            margin-left: 580px;
            margin-top: -100px;
            background-color: green;
            border-radius: 0px 360px 0px 360px;
            text-align: center;
             line-height: 100px;
              color: white;
        }
        #circle
        {
            width: 100px;
            height: 100px;
            margin-left: 20px;
            margin-top: 40px;
            border-radius: 360px;
            background-color: magenta;
            text-align: center;
             line-height: 100px;
              color: white;
        }
        #tab
        {
            width: 100px;
            height: 100px;
            margin-left: 150px;
            margin-top: -110px;
            background-color: aqua;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
            text-align: center;
             line-height: 100px;
              color: white;
             
        }
        #threeshield
        {
          width: 100px;
            height: 100px;
            margin-left: 280px;
            margin-top: -120px;
            background-color: blue;
            border-radius: 0px 90px 90px 90px;
            text-align: center;
             line-height: 100px;
             color: white;
            
        }
        #twisttwo
        {
            width: 230px;
            height: 100px;
            margin-left: 400px;
            margin-top: -100px;
            background-color:purple;
            border-radius: 2px 65px 5px 65px;
            text-align: center;
             line-height: 100px;
             color: white;
        }
        
    </style>
</head>
<body>
    <div id="leaf"><p>leaf</p></div>

    <div id="halfoval"><p>halfoval</p></div>
    <div id="oval"><p>oval</p></div>
    <div id="twist"><p>twist</p></div>
    <div id="circle"><p>circle</p></div>
    <div id="tab"><p>tab</p></div>
    <div id="threeshield"><p>three shield</p></div>
    <div id="twisttwo">twist two</div>
</body>
</html>
