<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #face
        {
            width: 300px;
            height: 300px;
            background-color: #ffcc4d;
            border-radius: 50%;
            position: relative;
        }
         .eye
         {
            width: 60px;
            height: 40px;
            border-radius: 360px;
           border: 12px solid #8B5A2B;
           border-top: none;
           border-left: none;
           border-right: none;
           position:absolute;
          


         }
         #eye1
        {
            top: 70px;
            left: 60px;
        }

        #eye2
        {
            top: 70px;
           left: 180px;
        }
        #mouth
        {
            width: 50px;
            height: 50px;
            background-color: #8B5A2B;
            border-radius: 50%;
            position:absolute;
            top: 180px;
            left: 123px;
        }
        .z
        {
            position: absolute;
            top: 30px;
            left: 250px;
            font-size: 75px;
            color: blue;
            animation-name: floatZzz;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            opacity: 1;
        }
        @keyframes floatZzz
        {
           0%
           {
              transform: translateY(0px);
              opacity: 0;
            }
            30%
            {
              opacity: 1;
            }
            100%
            {
               transform: translateY(-40px);
               opacity: 0;
            }
        }
        #face:hover
        {
            .eye
            {
                width: 70px;
                height: 70px;
                border-radius: 360px;
                border:none;
                background-color: white;
                
                position:absolute;
            }
           
        }
        .p
        {
            width: 30px;
            height: 30px;
            border-radius: 360px;
            border:none;
            background-color: #4b2e39; 
            position:absolute;
            top: 13px;
            left: 30px;
            opacity: 0;
        }
        #face:hover .p
        {   top: 20px;
            left: 20px;
            opacity: 1;
        }
        #face:hover #mouth
        {
            width: 120px;
            height: 50px;
            background-color:#8B5A2B ;
            border: 4px solid #8B5A2B;
            border-radius: 0 0 50px 50px;
            top: 190px;
            left: 90px;
        }
        #face:hover .z
        {
            opacity: 0;
            animation: none;
        }
        
    
    </style>
</head>
<body>
    <div id="face">
        <div class="eye" id="eye1">
            <div class="p"></div>
        </div>
        <div class="eye" id="eye2">
            <div class="p"></div>
        </div>
        <div id="mouth"></div>
        <div class="z">Zzz</div>
    </div>
</body>
</html>
