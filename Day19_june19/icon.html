<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

   
    <link rel="stylesheet" href="./fontawesome-free-6.7.2-web/fontawesome-free-6.7.2-web/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
        }

        #main{
            width:450px;
            height:650px;
            background:#111;
            border-radius:30px;
            padding:40px;
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:60px;
            font-size:50px;
        }

        .input-box{
            display:flex;
            align-items:center;
            margin-bottom:50px;
        }

        .input-box i{
            color:blue;
            font-size:35px;
            margin-right:20px;
        }

        .input-box input{
            width:100%;
            background:transparent;
            border:none;
            border-bottom:2px solid white;
            outline:none;
            color:white;
            font-size:20px;
            padding:10px;
        }

        button{
            display:block;
            margin:50px auto;
            width:180px;
            height:60px;
            border:none;
            border-radius:30px;
            font-size:22px;
        }

        
    </style>
</head>
<body>

<div id="main">

    <h1>SIGN IN</h1>

    <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-phone"></i>
        <input type="tel" placeholder="Phone">
    </div>

    <button>SIGN IN</button>

</div>

</body>
</html>
