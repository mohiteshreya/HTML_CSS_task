<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       #outer-square {
    width: 280px;
    height: 280px;
    border-radius: 60px;
    background: linear-gradient(
        140deg,
        #405de6,
        #5851db,
        #833ab4,
        #c13584,
        #e1306c,
        #fd1d1d,
        #f77737,
        #fcaf45,
        #ffdc80
    );
    padding-top: 2px;
}
    #innersquare
     {
    width: 180px;
    height: 180px;
    border: 12px solid white;
    border-radius: 50px;
    background: transparent;
     margin-left: 35px;
     margin-top: 42px;
     }
     #innercircle
     {
        width: 80px;
        height: 80px;
        border: 15px solid white;
        border-radius: 360px;
        background: transparent;
        margin-top: -1px;
        margin-left: 35px;
     }
     #dot
     {
        width: 30px;
        height: 30px;
        background-color: white;
        border-radius:360px ;
        margin-left: 130px;
        margin-top: 10px;
     }
    </style>
</head>
<body>
    <div id="outer-square">
        <div id="innersquare">
            <div id="dot">

                </div>

            <div id="innercircle">
                
            </div>

        </div>

    </div>
</body>
</html>
