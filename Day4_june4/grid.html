<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout</title>

<style>

*{
    margin:0;
    padding:0;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:black;
}

.container{
    width:700px;
    height:500px;
    background:white;
    padding:5px;
    display:grid;
    gap:5px;

    grid-template-columns:1fr 1fr 1fr 1fr 1fr;
    grid-template-rows:1fr 1fr 1fr 1fr;
}

.box{
    background:red;
}

#box1
{
    grid-column: 1/2;
    grid-row: 1/3;
}
#box2
{
    grid-column: 1/2;
    grid-row: 3/5;
}
#box3
{
    grid-column: 2/3;
    grid-row: 2/4;
}
#box4
{
    grid-column: 2/4;
    grid-row: 1/2;
}
#box5
{
    grid-column: 4/6;
    grid-row: 1/2;
}
#box6
{
    grid-column: 3/5;
    grid-row: 2/4;
}
#box7
{
    grid-column: 5/6;
    grid-row: 2/5;
}
#box8
{
    grid-column: 2/4;
    grid-row: 4/5
}
</style>
</head>
<body>

<div class="container">

<div class="box"id= "box1"></div>
<div class="box" id= "box2"></div>
<div class="box" id="box3"></div>
<div class="box"  id="box4"></div>
<div class="box" id="box5"></div>
<div class="box" id="box6"></div>
<div class="box" id="box7"></div>
<div class="box" id="box8"></div>
<div class="box" id="box9"></div>

</div>

</body>
</html>
